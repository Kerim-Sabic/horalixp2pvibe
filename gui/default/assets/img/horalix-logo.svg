<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 60" fill="none">
  <defs>
    <linearGradient id="hlxLogoGrad" x1="0" y1="0" x2="320" y2="60" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#4A8FFF"/>
      <stop offset="50%"  stop-color="#00D4FF"/>
      <stop offset="100%" stop-color="#00E5B0"/>
    </linearGradient>
    <linearGradient id="hlxWordGrad" x1="70" y1="0" x2="320" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#B0CFFF"/>
    </linearGradient>
  </defs>

  <!-- ── ICON: exact Horalix H-in-hexagon mark, stroked in gradient ── -->
  <!-- Outer hexagon shield: flat left/right, diagonal cuts at 4 corners -->
  <path d="M14 2
           L44 2
           L54 12
           L54 48
           L44 58
           L14 58
           L4  48
           L4  12
           Z"
        fill="none"
        stroke="url(#hlxLogoGrad)"
        stroke-width="3.5"
        stroke-linejoin="round"/>

  <!-- Left vertical bar of H -->
  <line x1="15" y1="11" x2="15" y2="49"
        stroke="url(#hlxLogoGrad)" stroke-width="5.5" stroke-linecap="round"/>

  <!-- Right vertical bar of H -->
  <line x1="43" y1="11" x2="43" y2="49"
        stroke="url(#hlxLogoGrad)" stroke-width="5.5" stroke-linecap="round"/>

  <!-- Upper S-curve crossbar: sweeps from upper-left to upper-right -->
  <path d="M15 24
           C 22 23, 27 18, 29 18
           C 31 18, 36 23, 43 24"
        fill="none"
        stroke="url(#hlxLogoGrad)"
        stroke-width="4.5"
        stroke-linecap="round"/>

  <!-- Lower S-curve crossbar: sweeps from lower-left to lower-right (mirrored) -->
  <path d="M15 36
           C 22 37, 27 42, 29 42
           C 31 42, 36 37, 43 36"
        fill="none"
        stroke="url(#hlxLogoGrad)"
        stroke-width="4.5"
        stroke-linecap="round"/>

  <!-- ── WORDMARK ── -->
  <text x="68" y="37"
        font-family="'Segoe UI', -apple-system, BlinkMacSystemFont, Arial, sans-serif"
        font-weight="800"
        font-size="26"
        letter-spacing="2.5"
        fill="url(#hlxWordGrad)">HORALIX</text>

  <!-- P2P sub-label -->
  <text x="70" y="51"
        font-family="'Segoe UI', -apple-system, BlinkMacSystemFont, Arial, sans-serif"
        font-weight="500"
        font-size="9.5"
        letter-spacing="6"
        fill="#4A8FFF"
        opacity="0.55">P 2 P</text>
</svg>
