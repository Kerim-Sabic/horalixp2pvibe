<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="640" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#06090F"/>
      <stop offset="100%" stop-color="#0A1525"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1280" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#4A8FFF"/>
      <stop offset="50%"  stop-color="#00D4FF"/>
      <stop offset="100%" stop-color="#00E5B0"/>
    </linearGradient>
    <linearGradient id="iconGrad" x1="0" y1="0" x2="200" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#4A8FFF"/>
      <stop offset="50%"  stop-color="#00D4FF"/>
      <stop offset="100%" stop-color="#00E5B0"/>
    </linearGradient>
    <radialGradient id="glow1" cx="30%" cy="40%" r="45%">
      <stop offset="0%"   stop-color="#4A8FFF" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#4A8FFF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="80%" cy="70%" r="40%">
      <stop offset="0%"   stop-color="#00E5B0" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#00E5B0" stop-opacity="0"/>
    </radialGradient>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="textGlow">
      <feGaussianBlur stdDeviation="8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="url(#bg)"/>
  <rect width="1280" height="640" fill="url(#glow1)"/>
  <rect width="1280" height="640" fill="url(#glow2)"/>

  <!-- Grid lines -->
  <g stroke="rgba(74,143,255,0.04)" stroke-width="1">
    <line x1="0"   y1="80"  x2="1280" y2="80"/>
    <line x1="0"   y1="160" x2="1280" y2="160"/>
    <line x1="0"   y1="240" x2="1280" y2="240"/>
    <line x1="0"   y1="320" x2="1280" y2="320"/>
    <line x1="0"   y1="400" x2="1280" y2="400"/>
    <line x1="0"   y1="480" x2="1280" y2="480"/>
    <line x1="0"   y1="560" x2="1280" y2="560"/>
    <line x1="160" y1="0"   x2="160"  y2="640"/>
    <line x1="320" y1="0"   x2="320"  y2="640"/>
    <line x1="480" y1="0"   x2="480"  y2="640"/>
    <line x1="640" y1="0"   x2="640"  y2="640"/>
    <line x1="800" y1="0"   x2="800"  y2="640"/>
    <line x1="960" y1="0"   x2="960"  y2="640"/>
    <line x1="1120" y1="0"  x2="1120" y2="640"/>
  </g>

  <!-- Top accent line -->
  <rect x="0" y="0" width="1280" height="3" fill="url(#accent)" opacity="0.7"/>

  <!-- ── HORALIX ICON (large, left side) ── -->
  <g transform="translate(110, 190) scale(3.8)" filter="url(#softGlow)">
    <!-- Outer hexagon shield -->
    <path d="M14 2 L44 2 L54 12 L54 46 L44 56 L14 56 L4 46 L4 12 Z"
          fill="none" stroke="url(#iconGrad)" stroke-width="3.5" stroke-linejoin="round"/>
    <!-- Left vertical bar -->
    <line x1="15" y1="11" x2="15" y2="47" stroke="url(#iconGrad)" stroke-width="5.5" stroke-linecap="round"/>
    <!-- Right vertical bar -->
    <line x1="43" y1="11" x2="43" y2="47" stroke="url(#iconGrad)" stroke-width="5.5" stroke-linecap="round"/>
    <!-- Upper S-curve -->
    <path d="M15 23 C22 22,27 17,29 17 C31 17,36 22,43 23"
          fill="none" stroke="url(#iconGrad)" stroke-width="4.5" stroke-linecap="round"/>
    <!-- Lower S-curve -->
    <path d="M15 35 C22 36,27 41,29 41 C31 41,36 36,43 35"
          fill="none" stroke="url(#iconGrad)" stroke-width="4.5" stroke-linecap="round"/>
  </g>

  <!-- ── WORDMARK ── -->
  <text x="360" y="295"
        font-family="'Segoe UI', -apple-system, Arial, sans-serif"
        font-weight="800"
        font-size="108"
        letter-spacing="6"
        fill="url(#accent)"
        filter="url(#textGlow)"
        opacity="0.95">HORALIX</text>

  <!-- P2P label -->
  <text x="365" y="345"
        font-family="'Segoe UI', -apple-system, Arial, sans-serif"
        font-weight="500"
        font-size="22"
        letter-spacing="14"
        fill="#4A8FFF"
        opacity="0.55">P 2 P</text>

  <!-- Tagline -->
  <text x="362" y="405"
        font-family="'Segoe UI', -apple-system, Arial, sans-serif"
        font-weight="400"
        font-size="26"
        letter-spacing="0.5"
        fill="#718BAF">Blazing-fast · Encrypted · No cloud · Open source</text>

  <!-- ── TRANSFER MODE PILLS ── -->
  <!-- Turbo -->
  <g transform="translate(362, 450)">
    <rect width="148" height="44" rx="22" fill="rgba(0,229,176,0.1)" stroke="rgba(0,229,176,0.35)" stroke-width="1.5"/>
    <text x="74" y="28" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif"
          font-weight="700" font-size="16" fill="#00E5B0">⚡ Turbo</text>
  </g>
  <!-- Balanced -->
  <g transform="translate(524, 450)">
    <rect width="168" height="44" rx="22" fill="rgba(74,143,255,0.1)" stroke="rgba(74,143,255,0.35)" stroke-width="1.5"/>
    <text x="84" y="28" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif"
          font-weight="700" font-size="16" fill="#4A8FFF">⚖️ Balanced</text>
  </g>
  <!-- Eco -->
  <g transform="translate(706, 450)">
    <rect width="118" height="44" rx="22" fill="rgba(155,114,255,0.1)" stroke="rgba(155,114,255,0.35)" stroke-width="1.5"/>
    <text x="59" y="28" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif"
          font-weight="700" font-size="16" fill="#9B72FF">🍃 Eco</text>
  </g>
  <!-- Mobile -->
  <g transform="translate(838, 450)">
    <rect width="140" height="44" rx="22" fill="rgba(255,209,102,0.1)" stroke="rgba(255,209,102,0.35)" stroke-width="1.5"/>
    <text x="70" y="28" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif"
          font-weight="700" font-size="16" fill="#FFD166">📱 Mobile</text>
  </g>

  <!-- ── STATS STRIP (bottom) ── -->
  <rect x="0" y="572" width="1280" height="68" fill="rgba(74,143,255,0.04)" />
  <line x1="0" y1="572" x2="1280" y2="572" stroke="rgba(74,143,255,0.15)" stroke-width="1"/>

  <!-- TLS 1.3 -->
  <text x="120" y="614" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif"
        font-size="13" font-weight="600" fill="#4A8FFF" opacity="0.7">🔒 TLS 1.3</text>
  <line x1="200" y1="585" x2="200" y2="625" stroke="rgba(74,143,255,0.12)" stroke-width="1"/>

  <!-- Block delta sync -->
  <text x="340" y="614" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif"
        font-size="13" font-weight="600" fill="#00D4FF" opacity="0.7">⚡ Block-level delta sync</text>
  <line x1="480" y1="585" x2="480" y2="625" stroke="rgba(74,143,255,0.12)" stroke-width="1"/>

  <!-- NAT traversal -->
  <text x="620" y="614" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif"
        font-size="13" font-weight="600" fill="#00E5B0" opacity="0.7">🌐 Full NAT Traversal</text>
  <line x1="760" y1="585" x2="760" y2="625" stroke="rgba(74,143,255,0.12)" stroke-width="1"/>

  <!-- No cloud -->
  <text x="900" y="614" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif"
        font-size="13" font-weight="600" fill="#9B72FF" opacity="0.7">☁️ Zero cloud dependency</text>
  <line x1="1040" y1="585" x2="1040" y2="625" stroke="rgba(74,143,255,0.12)" stroke-width="1"/>

  <!-- Go -->
  <text x="1160" y="614" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif"
        font-size="13" font-weight="600" fill="#FFD166" opacity="0.7">🐹 Written in Go</text>
</svg>
